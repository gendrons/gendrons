<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
 
<style>

    html, body {

        margin: 0;

        padding: 0;

        overflow: hidden;

        background: black;
 
        width: 100%;

        height: 100%;
 
        display: flex;

        justify-content: center; /* horizontal center */

        align-items: center;     /* vertical center */

    }
 
    /* Zone visible (viewport signage) */

    #viewport {

        #width: 500px;

        #height: 240px;

        #overflow: hidden;

        #position: relative;

    }
 
    /* Widget qu'on décale pour couper le haut/gauche */

    #sopfeu-widget-container {

        #position: absolute;

        #top: -103px;

        #left: -25px;

        #right: -180px;

        #width: 2100px;

        #height: 1200px;

    }
</style>
</head>
 
<body>
 
<div id="viewport">
<div

        id="sopfeu-widget-container"

        data-sopfeu-lng="fr_CA"

        data-sopfeu-media="20"

        data-sopfeu-responsive="true"
>
<span id="sopfeu-widget-loader"></span>
</div>
</div>
 
<script src="https://www.sopfeu.qc.ca/sopfeu-widget.js"></script>
 
</body>
</html>
